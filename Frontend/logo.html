<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Synthiq AI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section class="hero">

    <div class="laptop-frame">
      <div class="screen">
        <div class="brand-box">SA</div>

        <div class="content">
          <div class="left-side">
            <h1>
              SYNTHIQ AI
              <span>INTELLIGENCE PLATFORM</span>
            </h1>

            <p>
              Analyze trends, monitor performance, and transform raw data
              into clear business decisions with modern AI-powered dashboards.
            </p>

            <div class="buttons">
              <a href="main.html" class="btn primary">GET STARTED</a>
              <a href="#" class="btn secondary">CONTACT US</a>
            </div>
          </div>

          <div class="right-side">
            <div class="dashboard">
              <div class="top-cards">
                <div class="stat-card">
                  <span class="label">Revenue</span>
                  <strong>$128.4K</strong>
                  <small>+18.2%</small>
                </div>

                <div class="stat-card">
                  <span class="label">Users</span>
                  <strong>24,980</strong>
                  <small>+9.4%</small>
                </div>
              </div>

              <div class="graph-area">
                <div class="line-chart">
                  <span class="point p1"></span>
                  <span class="point p2"></span>
                  <span class="point p3"></span>
                  <span class="point p4"></span>
                  <span class="point p5"></span>
                  <div class="line one"></div>
                  <div class="line two"></div>
                  <div class="line three"></div>
                  <div class="line four"></div>
                </div>

                <div class="bar-chart">
                  <div class="bar b1"></div>
                  <div class="bar b2"></div>
                  <div class="bar b3"></div>
                  <div class="bar b4"></div>
                  <div class="bar b5"></div>
                </div>
              </div>

              <div class="bottom-table">
                <div class="table-row header">
                  <span>Source</span>
                  <span>Traffic</span>
                  <span>Growth</span>
                </div>
                <div class="table-row">
                  <span>Search</span>
                  <span>8.2K</span>
                  <span class="up">+12%</span>
                </div>
                <div class="table-row">
                  <span>Social</span>
                  <span>4.7K</span>
                  <span class="up">+8%</span>
                </div>
                <div class="table-row">
                  <span>Email</span>
                  <span>2.9K</span>
                  <span class="down">-3%</span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="glow-orb"></div>
      </div>

      <div class="laptop-base"></div>
    </div>
  </section>
</body>
</html>
